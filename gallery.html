<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Explore | Kagona PrimeNest</title>

<link rel="stylesheet" href="gallery.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
<button class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
<h2>Explore</h2>

<div class="top-icons">
<i class="fa-solid fa-sliders"></i>
<i class="fa-regular fa-heart"></i>
</div>

</div>
    
    

<!-- REELS -->
<div class="reel-container">

<!-- REEL 1 -->
<div class="reel" data-id="1">

<img src="https://images.unsplash.com/photo-1600585154207-8c7cdbb8e6b9">

<div class="heart-anim">❤️</div>

<div class="reel-actions">

<div class="action like-btn">
<i class="fa-regular fa-heart"></i>
<span class="like-count">590</span>
</div>

<div class="action">
<i class="fa-regular fa-comment"></i>
<span>14</span>
</div>

<div class="action">
<i class="fa-solid fa-share"></i>
<span>3</span>
</div>

</div>

<div class="reel-info">
<div class="profile">
<img src="logo.png">

<span class="username">
Kagona PrimeNest 
<i class="fa-solid fa-circle-check verified"></i>
</span>

<button class="contact-btn" data-phone="254712345678">
Contact
</button
</div>

<p class="caption">Luxury living redefined ✨🏡 Premium property in Nairobi</p>
</div>

</div>


<!-- REEL 2 -->
<div class="reel" data-id="2">

<img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688">

<div class="heart-anim">❤️</div>

<div class="reel-actions">

<div class="action like-btn">
<i class="fa-regular fa-heart"></i>
<span class="like-count">320</span>
</div>

<div class="action">
<i class="fa-regular fa-comment"></i>
<span>9</span>
</div>

<div class="action">
<i class="fa-solid fa-share"></i>
<span>2</span>
</div>

</div>

<div class="reel-info">
<div class="profile">
<img src="logo.png">

<span class="username">
Kagona PrimeNest 
<i class="fa-solid fa-circle-check verified"></i>
</span>

<button class="contact-btn" data-phone="254712345678">
Contact
</button>

</div>   

<p class="caption">Modern apartment in Westlands 🌆</p>
</div>

</div>

</div>


<!-- COMMENT BAR -->
<div class="comment-bar">
<input type="text" placeholder="Add comment..." id="commentInput">
<button id="sendBtn">
<i class="fa-solid fa-paper-plane"></i>
</button>
</div>

<!-- COMMENTS MODAL -->
<div class="comments-modal" id="commentsModal">

  <div class="comments-header">
    <span>Comments</span>
    <i class="fa-solid fa-xmark close-comments"></i>
  </div>

  <div class="comments-body" id="commentsList">
    <!-- Comments will appear here -->
  </div>

  <div class="comments-input">
    <input type="text" id="commentText" placeholder="Add a comment...">
    <button id="postComment">Post</button>
  </div>

</div>
    
<script src="gallery.js"></script>

</body>
  </html>
